<svg width="1200" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="200" fill="#0f172a"/>

  <!-- Border -->
  <rect x="10" y="10" width="1180" height="180" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>

  <!-- Connection Status Indicator -->
  <circle cx="40" cy="50" r="8" fill="#22c55e"/>
  <text x="60" y="56" font-family="Arial, sans-serif" font-size="14" fill="#f1f5f9" font-weight="bold">Connected to LM Studio</text>

  <!-- URL Input -->
  <text x="40" y="90" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">LM Studio URL:</text>
  <rect x="40" y="100" width="350" height="35" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="55" y="123" font-family="Courier New, monospace" font-size="13" fill="#f1f5f9">http://localhost:1234</text>

  <!-- Model Dropdown -->
  <text x="420" y="90" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Model:</text>
  <rect x="420" y="100" width="300" height="35" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="435" y="123" font-family="Arial, sans-serif" font-size="13" fill="#f1f5f9">llama-3-8b-instruct ▼</text>

  <!-- Test Connection Button -->
  <rect x="750" y="100" width="160" height="35" rx="6" fill="#3b82f6"/>
  <text x="785" y="123" font-family="Arial, sans-serif" font-size="13" fill="#f1f5f9" font-weight="bold">Test Connection</text>

  <!-- Status Messages -->
  <text x="40" y="160" font-family="Arial, sans-serif" font-size="11" fill="#22c55e">✓ Connected successfully</text>
  <text x="250" y="160" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">• 5 models available</text>

  <!-- Placeholder indicator -->
  <text x="1000" y="180" font-family="Arial, sans-serif" font-size="10" fill="#64748b">[Screenshot Placeholder]</text>
</svg>
