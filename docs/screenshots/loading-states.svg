<svg width="800" height="150" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="150" fill="#1e293b"/>

  <!-- Loading container -->
  <rect x="20" y="20" width="760" height="110" rx="8" fill="#0f172a"/>

  <!-- Phase indicator 1 - Active -->
  <rect x="50" y="40" width="220" height="70" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="65" font-family="Arial, sans-serif" font-size="16" fill="#60a5fa" text-anchor="middle">🔄</text>
  <text x="160" y="90" font-family="Arial, sans-serif" font-size="13" fill="#bfdbfe" text-anchor="middle" font-weight="bold">Generating code...</text>

  <!-- Phase indicator 2 - Pending -->
  <rect x="290" y="40" width="220" height="70" rx="6" fill="#334155"/>
  <text x="400" y="65" font-family="Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">🔍</text>
  <text x="400" y="90" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Reviewing code...</text>

  <!-- Phase indicator 3 - Pending -->
  <rect x="530" y="40" width="220" height="70" rx="6" fill="#334155"/>
  <text x="640" y="65" font-family="Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">✨</text>
  <text x="640" y="90" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Applying feedback...</text>

  <!-- Placeholder text -->
  <text x="400" y="140" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">[Screenshot Placeholder - Capture during pipeline execution]</text>
</svg>
